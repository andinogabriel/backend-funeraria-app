components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT de acceso emitido por `/api/v1/users/login`.
  parameters:
    XDeviceId:
      name: X-Device-Id
      in: header
      required: true
      description: Identificador estable del dispositivo o cliente que creo la sesion.
      schema:
        type: string
        example: web-chrome-gabriel
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: Clave opcional para evitar reintentos duplicados en login y refresh.
      schema:
        type: string
        example: 31d8e812-3f3c-40c0-86db-23458f5bfe0b
    DniPath:
      name: dni
      in: path
      required: true
      description: Documento nacional de identidad.
      schema:
        type: integer
        format: int32
        example: 35123456
    LongIdPath:
      name: id
      in: path
      required: true
      description: Identificador numerico.
      schema:
        type: integer
        format: int64
        example: 1
    EmailPath:
      name: email
      in: path
      required: true
      description: Email del usuario.
      schema:
        type: string
        format: email
        example: admin@funeraria.local
    SearchValueQuery:
      name: value
      in: query
      required: true
      description: Texto de busqueda por nombre, apellido o DNI.
      schema:
        type: string
        example: gomez
    ProvinceIdQuery:
      name: province_id
      in: query
      required: true
      description: Id de la provincia.
      schema:
        type: integer
        format: int64
        example: 6
    ReceiptNumberPath:
      name: receiptNumber
      in: path
      required: true
      description: Numero de comprobante.
      schema:
        type: integer
        format: int64
        example: 10025
    ItemCodePath:
      name: code
      in: path
      required: true
      description: Codigo del item.
      schema:
        type: string
        example: ATAUD-ROBLE-01
    NifPath:
      name: nif
      in: path
      required: true
      description: Identificador fiscal del proveedor.
      schema:
        type: string
        example: 30-12345678-9
    IsDeletedQuery:
      name: isDeleted
      in: query
      required: false
      description: Filtra ingresos borrados logicamente.
      schema:
        type: boolean
        default: false
    PageQuery:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
    LimitQuery:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 5
    SortByQuery:
      name: sortBy
      in: query
      required: false
      schema:
        type: string
        default: incomeDate
    SortDirQuery:
      name: sortDir
      in: query
      required: false
      schema:
        type: string
        enum: [asc, desc]
        default: desc
  responses:
    ValidationResponse:
      description: Error de validacion de request.
      headers:
        X-Trace-Id:
          $ref: '#/components/headers/TraceIdHeader'
        X-Correlation-Id:
          $ref: '#/components/headers/CorrelationIdHeader'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ValidationProblem'
          example:
            type: about:blank
            title: Validacion fallida
            status: 400
            detail: La solicitud contiene datos invalidos.
            traceId: 4bf92f3577b34da6a3ce929d0e0e4736
            errors:
              - field: email
                message: El email es requerido.
    UnauthorizedResponse:
      description: Request sin credenciales validas, token invalido o dispositivo no coincidente.
      headers:
        X-Trace-Id:
          $ref: '#/components/headers/TraceIdHeader'
        X-Correlation-Id:
          $ref: '#/components/headers/CorrelationIdHeader'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
          example:
            type: about:blank
            title: Error de aplicacion
            status: 401
            detail: El token no coincide con el dispositivo actual.
            code: security.jwt.device.mismatch
            traceId: 4bf92f3577b34da6a3ce929d0e0e4736
            correlationId: corr-request-0001
    ForbiddenResponse:
      description: El usuario autenticado no tiene permisos para ejecutar la operacion.
      headers:
        X-Trace-Id:
          $ref: '#/components/headers/TraceIdHeader'
        X-Correlation-Id:
          $ref: '#/components/headers/CorrelationIdHeader'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
          example:
            type: about:blank
            title: Acceso denegado
            status: 403
            detail: Access Denied
            traceId: 4bf92f3577b34da6a3ce929d0e0e4736
    NotFoundResponse:
      description: Recurso no encontrado.
      headers:
        X-Trace-Id:
          $ref: '#/components/headers/TraceIdHeader'
        X-Correlation-Id:
          $ref: '#/components/headers/CorrelationIdHeader'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
          example:
            type: about:blank
            title: Error de aplicacion
            status: 404
            detail: No existe afiliado con el DNI especificado.
            code: affiliate.error.not.found
            traceId: 4bf92f3577b34da6a3ce929d0e0e4736
    ConflictResponse:
      description: Conflicto de negocio, duplicado o estado incompatible.
      headers:
        X-Trace-Id:
          $ref: '#/components/headers/TraceIdHeader'
        X-Correlation-Id:
          $ref: '#/components/headers/CorrelationIdHeader'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
          example:
            type: about:blank
            title: Error de aplicacion
            status: 409
            detail: Ya existe un afiliado registrado con el DNI especificado.
            code: affiliate.error.dni.already.exists
            traceId: 4bf92f3577b34da6a3ce929d0e0e4736
    TooManyRequestsResponse:
      description: Se alcanzo el limite de intentos o se detecto una conducta sospechosa.
      headers:
        X-Trace-Id:
          $ref: '#/components/headers/TraceIdHeader'
        X-Correlation-Id:
          $ref: '#/components/headers/CorrelationIdHeader'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
          example:
            type: about:blank
            title: Demasiados intentos de inicio de sesion
            status: 429
            detail: Demasiados intentos de inicio de sesion. Intente nuevamente mas tarde.
            code: auth.login.rate.limit.exceeded
            retryAfterSeconds: 120
            traceId: 4bf92f3577b34da6a3ce929d0e0e4736
    InternalServerErrorResponse:
      description: Error interno del servidor.
      headers:
        X-Trace-Id:
          $ref: '#/components/headers/TraceIdHeader'
        X-Correlation-Id:
          $ref: '#/components/headers/CorrelationIdHeader'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
          example:
            type: about:blank
            title: Error interno del servicio
            status: 500
            detail: Ocurrio un error interno inesperado.
            code: error.internal
            traceId: 4bf92f3577b34da6a3ce929d0e0e4736
  headers:
    TraceIdHeader:
      description: Identificador unico de la request generado o propagado por el servicio.
      schema:
        type: string
        example: 4bf92f3577b34da6a3ce929d0e0e4736
    CorrelationIdHeader:
      description: Identificador opcional provisto por el cliente para correlacionar requests entre sistemas.
      schema:
        type: string
        example: corr-request-0001
  schemas:
    ProblemDetail:
      type: object
      description: Modelo de error estandar usado por el backend.
      example:
        type: about:blank
        title: Error de aplicacion
        status: 404
        detail: No existe afiliado con el DNI especificado.
        code: affiliate.error.not.found
        traceId: 4bf92f3577b34da6a3ce929d0e0e4736
        correlationId: corr-request-0001
      properties:
        type:
          type: string
          format: uri
          nullable: true
          example: about:blank
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
          format: uri
          nullable: true
        code:
          type: string
          description: Clave funcional vinculada a `messages_es.properties`.
        traceId:
          type: string
          description: Identificador unico de la request para correlacionar logs, errores y metricas.
          example: 4bf92f3577b34da6a3ce929d0e0e4736
        correlationId:
          type: string
          nullable: true
          description: Identificador opcional provisto por el cliente y propagado por el backend.
          example: corr-request-0001
        retryAfterSeconds:
          type: integer
          nullable: true
      additionalProperties: false
    ValidationProblem:
      example:
        type: about:blank
        title: Validacion fallida
        status: 400
        detail: La solicitud contiene datos invalidos.
        traceId: 4bf92f3577b34da6a3ce929d0e0e4736
        errors:
          - field: email
            message: El email es requerido.
      allOf:
        - $ref: '#/components/schemas/ProblemDetail'
        - type: object
          properties:
            errors:
              type: array
              items:
                $ref: '#/components/schemas/ValidationError'
    ValidationError:
      type: object
      properties:
        field:
          type: string
          example: email
        message:
          type: string
          example: no debe estar vacio
      required: [field, message]
    HalLink:
      type: object
      properties:
        href:
          type: string
          example: http://localhost:8080/api/v1/users/me
      required: [href]
    OperationStatusModel:
      type: object
      properties:
        name:
          type: string
          example: DELETE ITEM
        result:
          type: string
