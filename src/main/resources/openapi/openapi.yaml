openapi: 3.1.0
info:
  title: Backend Funeraria App API
  version: 2.1.0
  description: |
    Contrato HTTP del monolito `backend-funeraria-app`.

    La API esta organizada por slices funcionales y documenta:
    - endpoints disponibles hoy en controllers reales
    - requests y responses con sus DTOs actuales
    - reglas de seguridad por JWT ligado a dispositivo
    - errores esperables por validacion, autorizacion y reglas de negocio

    Convenciones importantes:
    - Los endpoints autenticados requieren `Authorization: Bearer <token>`.
    - Los endpoints autenticados tambien requieren `X-Device-Id`.
    - `POST /api/v1/users/login` y `POST /api/v1/users/refresh` aceptan `Idempotency-Key`.
    - Todas las respuestas incluyen `X-Trace-Id`; si el cliente envia `X-Correlation-Id`, la API lo propaga.
    - Los errores de negocio y validacion siguen el modelo `ProblemDetail`.
servers:
  - url: http://localhost:8081
    description: Entorno local
tags:
  - name: Authentication
    description: Registro, login, refresh, logout y activacion de cuenta.
  - name: Users
    description: Perfil del usuario autenticado, roles y datos de contacto.
  - name: Affiliates
    description: Gestion de afiliados.
  - name: Deceased
    description: Gestion de fallecidos.
  - name: Funerals
    description: Gestion de funerales.
  - name: Incomes
    description: Gestion de ingresos y compras.
  - name: Items
    description: Inventario y carga de imagenes.
  - name: Plans
    description: Planes funerarios.
  - name: Suppliers
    description: Gestion de proveedores.
  - name: Catalogs
    description: Catalogos de apoyo para formularios y reglas de negocio.
paths:
  /api/v1/users:
    get:
      tags: [Users]
      summary: Listar usuarios
      description: Solo ADMIN. Devuelve todos los usuarios registrados ordenados por la regla actual del servicio.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XDeviceId'
      responses:
        '200':
          description: Lista de usuarios.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserResponseDto'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'
    post:
      tags: [Authentication]
      summary: Registrar usuario
      description: Crea una cuenta nueva. El backend puede asignar roles, direcciones y telefonos iniciales.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegisterDto'
      responses:
        '201':
          description: Usuario creado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponseDto'
        '400':
          $ref: '#/components/responses/ValidationResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  /api/v1/users/me:
    get:
      tags: [Users]
      summary: Obtener usuario autenticado
      description: Devuelve el recurso HATEOAS del usuario autenticado con link `me`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XDeviceId'
      responses:
        '200':
          description: Usuario autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserMeResource'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  /api/v1/users/login:
    post:
      tags: [Authentication]
      summary: Iniciar sesion
      description: |
        Autentica por email y password y devuelve un access token JWT mas un refresh token opaco.
        El token queda ligado al dispositivo declarado en `deviceInfo`.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLoginDto'
      responses:
        '200':
          description: Sesion iniciada correctamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JwtDto'
        '400':
          $ref: '#/components/responses/ValidationResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  /api/v1/users/refresh:
    post:
      tags: [Authentication]
      summary: Rotar refresh token
      description: Valida el refresh token y el dispositivo y devuelve un nuevo par de tokens.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequestDto'
      responses:
        '200':
          description: Tokens rotados correctamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JwtDto'
        '400':
          $ref: '#/components/responses/ValidationResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  /api/v1/users/logout:
    put:
      tags: [Authentication]
      summary: Cerrar sesion
      description: Invalida la sesion activa del dispositivo informado.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XDeviceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogOutRequestDto'
      responses:
        '200':
          description: Sesion invalidada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationStatusModel'
        '400':
          $ref: '#/components/responses/ValidationResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  /api/v1/users/activation:
    get:
      tags: [Authentication]
      summary: Confirmar cuenta
      description: Activa la cuenta usando el token de confirmacion.
      parameters:
        - name: token
          in: query
          required: true
          description: Token de activacion recibido por el usuario.
          schema:
            type: string
      responses:
        '200':
          description: Mensaje textual con el resultado del proceso.
          content:
            text/plain:
              schema:
                type: string
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  /api/v1/users/change-password:
    post:
      tags: [Users]
      summary: Cambiar password del usuario autenticado
      description: Requiere sesion valida. Cambia la password a partir de la password anterior.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XDeviceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetDto'
      responses:
        '200':
          description: Confirmacion del cambio de password.
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
        '400':
          $ref: '#/components/responses/ValidationResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  /api/v1/users/addresses-and-phones:
    get:
      tags: [Users]
      summary: Obtener direcciones y telefonos del usuario autenticado
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XDeviceId'
      responses:
        '200':
          description: Direcciones y telefonos del usuario actual.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserAddressAndPhoneDto'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  /api/v1/users/rol/{email}:
    post:
      tags: [Users]
      summary: Agregar o actualizar rol de un usuario
      description: Solo ADMIN. Devuelve el set de roles actualizado del usuario.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XDeviceId'
        - $ref: '#/components/parameters/EmailPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RolRequestDto'
      responses:
        '200':
          description: Roles actualizados.
          content:
            application/json:
              schema:
                type: array
                uniqueItems: true
                items:
                  $ref: '#/components/schemas/RolRequestDto'
        '400':
          $ref: '#/components/responses/ValidationResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  /api/v1/users/address:
    post:
      tags: [Users]
      summary: Reemplazar direcciones del usuario autenticado
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XDeviceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/AddressRequestDto'
      responses:
        '200':
          description: Direcciones persistidas.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AddressResponseDto'
        '400':
          $ref: '#/components/responses/ValidationResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  /api/v1/users/mobile-numbers:
    post:
      tags: [Users]
      summary: Reemplazar telefonos del usuario autenticado
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XDeviceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/MobileNumberRequestDto'
      responses:
        '200':
          description: Telefonos persistidos.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MobileNumberResponseDto'
        '400':
          $ref: '#/components/responses/ValidationResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  /api/v1/affiliates:
    get:
      tags: [Affiliates]
      summary: Listar afiliados activos
      description: Solo ADMIN. Devuelve afiliados con `deceased=false`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XDeviceId'
      responses:
        '200':
          description: Lista de afiliados activos.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AffiliateResponseDto'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'
    post:
      tags: [Affiliates]
      summary: Crear afiliado
      description: Disponible para ADMIN y USER.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XDeviceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AffiliateRequestDto'
      responses:
        '201':
          description: Afiliado creado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AffiliateResponseDto'
        '400':
          $ref: '#/components/responses/ValidationResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  /api/v1/affiliates/search:
    get:
      tags: [Affiliates]
      summary: Buscar afiliados por nombre, apellido o DNI
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XDeviceId'
        - $ref: '#/components/parameters/SearchValueQuery'
      responses:
        '200':
          description: Resultado de busqueda.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AffiliateResponseDto'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  /api/v1/affiliates/deceased:
    get:
      tags: [Affiliates]
      summary: Listar afiliados historicos o fallecidos
      description: Solo ADMIN.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XDeviceId'
      responses:
        '200':
          description: Lista historica.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AffiliateResponseDto'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  /api/v1/affiliates/by-user:
    get:
      tags: [Affiliates]
      summary: Listar afiliados del usuario autenticado
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XDeviceId'
      responses:
        '200':
          description: Afiliados asociados al usuario autenticado.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AffiliateResponseDto'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  /api/v1/affiliates/{dni}:
    put:
      tags: [Affiliates]
      summary: Actualizar afiliado
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XDeviceId'
        - $ref: '#/components/parameters/DniPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AffiliateRequestDto'
      responses:
        '200':
          description: Afiliado actualizado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AffiliateResponseDto'
        '400':
          $ref: '#/components/responses/ValidationResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'
    delete:
      tags: [Affiliates]
      summary: Eliminar afiliado
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XDeviceId'
        - $ref: '#/components/parameters/DniPath'
      responses:
        '200':
          description: Operacion completada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationStatusModel'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  /api/v1/brands:
    get:
      tags: [Catalogs]
      summary: Listar marcas
      description: Requiere autenticacion aunque no exija rol ADMIN.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XDeviceId'
      responses:
        '200':
          description: Lista de marcas.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BrandResponseDto'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'
    post:
      tags: [Catalogs]
      summary: Crear marca
      description: Solo ADMIN.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XDeviceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BrandRequestDto'
      responses:
        '201':
          description: Marca creada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrandResponseDto'
        '400':
          $ref: '#/components/responses/ValidationResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  /api/v1/brands/{id}:
    get:
      tags: [Catalogs]
      summary: Obtener marca por id
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XDeviceId'
        - $ref: '#/components/parameters/LongIdPath'
      responses:
        '200':
          description: Marca encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrandResponseDto'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'
    put:
      tags: [Catalogs]
      summary: Actualizar marca
      description: Solo ADMIN.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XDeviceId'
        - $ref: '#/components/parameters/LongIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BrandRequestDto'
      responses:
        '200':
          description: Marca actualizada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrandResponseDto'
        '400':
          $ref: '#/components/responses/ValidationResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'
    delete:
      tags: [Catalogs]
      summary: Eliminar marca
      description: Solo ADMIN.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XDeviceId'
        - $ref: '#/components/parameters/LongIdPath'
      responses:
        '200':
          description: Marca eliminada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationStatusModel'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  /api/v1/categories:
    get:
      tags: [Catalogs]
      summary: Listar categorias
      description: Endpoint publico utilizado para formularios y catalogos.
      responses:
        '200':
          description: Lista de categorias.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CategoryResponseDto'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'
    post:
      tags: [Catalogs]
      summary: Crear categoria
      description: Solo ADMIN.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XDeviceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryRequestDto'
      responses:
        '201':
          description: Categoria creada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponseDto'
        '400':
          $ref: '#/components/responses/ValidationResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  /api/v1/categories/{id}:
    get:
      tags: [Catalogs]
      summary: Obtener categoria por id
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XDeviceId'
        - $ref: '#/components/parameters/LongIdPath'
      responses:
        '200':
          description: Categoria encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponseDto'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'
    put:
      tags: [Catalogs]
      summary: Actualizar categoria
      description: Solo ADMIN.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XDeviceId'
        - $ref: '#/components/parameters/LongIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryRequestDto'
      responses:
        '200':
          description: Categoria actualizada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponseDto'
        '400':
          $ref: '#/components/responses/ValidationResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'
    delete:
      tags: [Catalogs]
      summary: Eliminar categoria
      description: Solo ADMIN.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XDeviceId'
        - $ref: '#/components/parameters/LongIdPath'
      responses:
        '200':
          description: Categoria eliminada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationStatusModel'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  /api/v1/cities:
    get:
      tags: [Catalogs]
      summary: Listar ciudades por provincia
      description: Endpoint publico. Requiere el query param `province_id`.
      parameters:
        - $ref: '#/components/parameters/ProvinceIdQuery'
      responses:
        '200':
          description: Ciudades de la provincia indicada.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CityResponseDto'
        '400':
          $ref: '#/components/responses/ValidationResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  /api/v1/cities/{id}:
    get:
      tags: [Catalogs]
      summary: Obtener ciudad por id
      description: Requiere autenticacion.
      security:
        - bearerAuth: []
