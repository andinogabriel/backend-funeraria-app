spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/funerariadb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}

# spring-boot-starter-mail registers a MailHealthIndicator that pings the configured SMTP
# server during every /actuator/health probe. The docker dev profile does not configure
# real SMTP (the email confirmation flow is exercised in production / staging only), so
# the indicator fails with `AuthenticationFailedException: failed to connect, no password
# specified?` and flips the aggregate health endpoint to DOWN even though liveness and
# readiness are both UP. Disable the indicator here; production overrides this back to
# `true` once real SMTP credentials are wired through alertmanager-style env vars.
management.health.mail.enabled=${MANAGEMENT_HEALTH_MAIL_ENABLED:false}

app.storage.provider=local
app.storage.local.root-path=${APP_STORAGE_LOCAL_ROOT_PATH:/data/storage}
app.storage.local.public-base-url=${APP_STORAGE_LOCAL_PUBLIC_BASE_URL:http://localhost:8081/files/}
app.web.cors.enabled=${APP_WEB_CORS_ENABLED:false}
app.web.cors.allowed-origin-patterns=${APP_WEB_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

app.bootstrap.admin.enabled=${APP_BOOTSTRAP_ADMIN_ENABLED:true}
app.bootstrap.admin.email=${APP_BOOTSTRAP_ADMIN_EMAIL:admin@funeraria.local}
app.bootstrap.admin.password=${APP_BOOTSTRAP_ADMIN_PASSWORD:Admin123!}
app.bootstrap.admin.first-name=${APP_BOOTSTRAP_ADMIN_FIRST_NAME:Admin}
app.bootstrap.admin.last-name=${APP_BOOTSTRAP_ADMIN_LAST_NAME:Funeraria}

# Adaptive threat protection (see SecurityRequestProperties / AdaptiveThreatProtectionAdapter)
# ships with production-grade defaults: 2 suspicious requests => 1 h blacklist, instant
# blacklist on any device-id mismatch. In dev this turns every routine glitch (hot reload
# with stale localStorage, freshly cleared device id while a JWT carrying the old one is
# still in flight, a 401 burst after the access token expires) into an hour of being locked
# out — recoverable only by `docker compose down && up` because the principal blacklist
# lives in an in-memory ExpiringMap and the TTL is enforced before the key is removed.
#
# Loosen the policy for the docker profile so a single typo or expired-token chase does not
# poison the rest of the session. Production overrides these back via the env vars the same
# way SMTP credentials are wired in ADR-0008. The shape is unchanged; only the numbers are
# friendlier to interactive development.
security.threat-protection.failed-login-blacklist-threshold=${SECURITY_THREAT_PROTECTION_FAILED_LOGIN_BLACKLIST_THRESHOLD:50}
security.threat-protection.suspicious-request-threshold=${SECURITY_THREAT_PROTECTION_SUSPICIOUS_REQUEST_THRESHOLD:50}
security.threat-protection.blacklist-seconds=${SECURITY_THREAT_PROTECTION_BLACKLIST_SECONDS:60}
security.threat-protection.immediate-blacklist-on-device-mismatch=${SECURITY_THREAT_PROTECTION_IMMEDIATE_BLACKLIST_ON_DEVICE_MISMATCH:false}
