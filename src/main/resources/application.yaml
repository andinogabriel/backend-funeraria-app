amazon-s3:
  access-key: ${AMAZON_S3_ACCESS_KEY:local-access-key}
  secret-key: ${AMAZON_S3_SECRET_KEY:local-secret-key}
  region: ${AMAZON_S3_REGION:sa-east-1}

jwt-token:
  expiration-seconds: ${JWT_TOKEN_EXPIRATION_SECONDS:900}
  prefix: Bearer
  authorities: authorities
  header: Authorization
  secret: ${JWT_TOKEN_SECRET:change-this-jwt-secret-in-production}
  device-id-claim: device_id
  device-fingerprint-claim: device_fingerprint
  device-version-claim: device_version

security:
  password:
    pepper: ${SECURITY_PASSWORD_PEPPER:change-me}
    salt-length: 16
    hash-length: 32
    parallelism: 1
    memory-kb: 65536
    iterations: 3
  request:
    device-id-header: X-Device-Id
    idempotency-key-header: Idempotency-Key
    fingerprint-secret: ${SECURITY_REQUEST_FINGERPRINT_SECRET:change-me-too}
  refresh-token:
    expiration-seconds: 604800
    random-bytes-length: 32
  threat-protection:
    failed-login-blacklist-threshold: 10
    suspicious-request-threshold: 2
    blacklist-seconds: 3600
    immediate-blacklist-on-device-mismatch: true
  idempotency:
    ttl-seconds: 120

observability:
  request-tracing:
    trace-id-header: X-Trace-Id
    correlation-id-header: X-Correlation-Id
    accept-incoming-trace-id: true

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  info:
    build:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
  tracing:
    # Micrometer Tracing is bridged to the OpenTelemetry SDK by 'micrometer-tracing-bridge-otel'.
    # Spring auto-instruments HTTP server requests, RestClient, JDBC and the application's
    # observation API; spans are correlated with the existing 'traceId'/'spanId' MDC keys used by
    # the request log pattern. Sampling default is 1.0 so every request is captured during
    # development; tighten via env var (for example MANAGEMENT_TRACING_SAMPLING_PROBABILITY=0.1)
    # in production to keep collector ingest within budget.
    enabled: true
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      # When 'endpoint' is unset (default), the OTLP exporter is auto-configured but receives no
      # endpoint so spans stay in-process and traceId still flows into MDC and response headers
      # without any external dependency. Set MANAGEMENT_OTLP_TRACING_ENDPOINT (for example
      # http://otel-collector:4318/v1/traces) to ship spans to a collector. The collector wiring
      # lives in the docker-compose 'observability' profile and is shipped in a follow-up PR
      # alongside Tempo and the tracing dashboards.
      endpoint: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:}
      transport: http

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} level=%-5level traceId=%X{traceId} correlationId=%X{correlationId} logger=%logger{36} thread=%thread %kvp message=\"%msg\"%n%wEx"
    file: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} level=%-5level traceId=%X{traceId} correlationId=%X{correlationId} logger=%logger{36} thread=%thread %kvp message=\"%msg\"%n%wEx"

spring:
  messages:
    basename: "messages,messages/messages"
    encoding: UTF-8
    fallback-to-system-locale: false

AbstractUserDetailsAuthenticationProvider:
  badCredentials: Contrasena incorrecta.
