server.port=${SERVER_PORT:8081}
server.error.include-message=always
server.error.include-binding-errors=always
spring.application.name=backend-funeraria-app

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/funerariadb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-migration-naming=true

spring.sql.init.mode=never

spring.servlet.multipart.max-file-size=7MB
# Jackson is the configured JSON mapper. DTOs use @Jacksonized records, entities rely on
# @JsonFormat (e.g. IncomeEntity.incomeDate), and Spring Boot 4 ships Jackson by default.
# The previous "gson" override silently broke those Jackson-only annotations.
springdoc.swagger-ui.defaultModelsExpandDepth=-1

app.web.cors.enabled=${APP_WEB_CORS_ENABLED:false}
app.web.cors.allowed-origin-patterns=${APP_WEB_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

app.storage.provider=${APP_STORAGE_PROVIDER:s3}

aws.s3.bucket.name=${AWS_S3_BUCKET_NAME:backend-funeraria-local}
aws.s3.bucket.url=${AWS_S3_BUCKET_URL:http://localhost:8081/files/}

spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.transport.protocol=${SPRING_MAIL_TRANSPORT_PROTOCOL:smtp}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS:true}
