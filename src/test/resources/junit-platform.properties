# Discovery configuration for the JUnit Platform engines used in this project. The Cucumber
# engine reads these properties to locate features and step definitions; the file lives in
# `src/test/resources` so both Surefire and IDE runners pick it up automatically.

# Glue: package(s) that contain step definitions and Spring configuration for Cucumber.
cucumber.glue=disenodesistemas.backendfunerariaapp.modern.bdd

# Where the .feature files live (relative to the test classpath).
cucumber.features=classpath:features

# Plugin output: pretty console reports plus a machine-readable JSON file the team can attach
# to PR descriptions or CI artifacts when investigating a failed scenario.
cucumber.plugin=pretty,json:target/cucumber/report.json,html:target/cucumber/report.html

# Match scenario names to the Java conventions used for the rest of the test suite. Cucumber
# 7+ uses underscores by default which clashes with the camelCase used by JUnit reports here.
cucumber.publish.quiet=true
