name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
      - "feature/**"
      - "codex/**"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Run Maven verify
        run: mvn -q verify

      - name: Summarize verify results
        if: always()
        shell: bash
        run: |
          {
            echo "## Verify"
            echo ""
            echo "- Java: Temurin 25"
            echo "- Command: \`mvn -q verify\`"
            if [ -d target/site/jacoco ]; then
              echo "- JaCoCo report: available"
            else
              echo "- JaCoCo report: not generated"
            fi
            if [ -d target/surefire-reports ]; then
              echo "- Surefire reports: available"
            else
              echo "- Surefire reports: not generated"
            fi
            if [ -f target/checkstyle-result.xml ]; then
              echo "- Checkstyle report: available"
            else
              echo "- Checkstyle report: not generated"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco
          if-no-files-found: ignore

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports
          if-no-files-found: ignore

      - name: Upload Checkstyle report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-report
          path: target/checkstyle-result.xml
          if-no-files-found: ignore

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: verify

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        id: docker-build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          tags: backend-funeraria-app:ci
          push: false
          load: false
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summarize Docker build
        if: always()
        shell: bash
        env:
          IMAGE_DIGEST: ${{ steps.docker-build.outputs.digest }}
        run: |
          {
            echo "## Docker Build"
            echo ""
            echo "- Dockerfile: \`Dockerfile\`"
            echo "- Tag: \`backend-funeraria-app:ci\`"
            echo "- Buildx cache: \`type=gha\`"
            if [ -n "$IMAGE_DIGEST" ]; then
              echo "- Image digest: \`$IMAGE_DIGEST\`"
            else
              echo "- Image digest: not exported"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
