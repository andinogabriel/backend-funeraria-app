# Grafana Tempo configuration for the local observability stack.
#
# Single-binary deployment using the local filesystem as the trace store. This is intentionally
# the smallest possible setup that still produces a working trace search UI in Grafana — there
# is no S3 backend, no clustering, no metrics-generator and no compactor tuning. The goal is to
# let a contributor running the observability profile follow a request from the request log to
# its trace without setting up cloud infrastructure first.

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  trace_idle_period: 10s
  max_block_duration: 1m

compactor:
  compaction:
    block_retention: 24h

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    wal:
      path: /var/tempo/wal
