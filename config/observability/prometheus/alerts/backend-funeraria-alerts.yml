groups:
  - name: backend-funeraria-app
    interval: 30s
    rules:
      - alert: BackendFunerariaAppDown
        expr: up{job="backend-funeraria-app"} == 0
        for: 1m
        labels:
          severity: critical
          service: backend-funeraria-app
        annotations:
          summary: Backend Funeraria App is down
          description: The monolith has not been scraped successfully for more than one minute.

      - alert: BackendFunerariaHigh5xxRate
        expr: |
          sum(rate(http_server_requests_seconds_count{job="backend-funeraria-app",status=~"5.."}[5m]))
          /
          clamp_min(sum(rate(http_server_requests_seconds_count{job="backend-funeraria-app"}[5m])), 1)
          > 0.05
        for: 5m
        labels:
          severity: warning
          service: backend-funeraria-app
        annotations:
          summary: High 5xx error ratio
          description: More than 5% of the recent HTTP traffic is failing with server-side errors.

      - alert: BackendFunerariaHighLatencyP95
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(http_server_requests_seconds_bucket{job="backend-funeraria-app"}[5m]))
          ) > 1.5
        for: 10m
        labels:
          severity: warning
          service: backend-funeraria-app
        annotations:
          summary: High HTTP latency p95
          description: The 95th percentile latency has stayed above 1.5 seconds for ten minutes.

      - alert: BackendFunerariaDatabasePoolPressure
        expr: |
          sum(hikaricp_connections_active{job="backend-funeraria-app"})
          /
          clamp_min(sum(hikaricp_connections_max{job="backend-funeraria-app"}), 1)
          > 0.80
        for: 10m
        labels:
          severity: warning
          service: backend-funeraria-app
        annotations:
          summary: High database connection pool pressure
          description: The Hikari connection pool has been above 80% utilization for ten minutes.

      - alert: BackendFunerariaHeapPressure
        expr: |
          sum(jvm_memory_used_bytes{job="backend-funeraria-app",area="heap"})
          /
          clamp_min(sum(jvm_memory_max_bytes{job="backend-funeraria-app",area="heap"}), 1)
          > 0.85
        for: 10m
        labels:
          severity: warning
          service: backend-funeraria-app
        annotations:
          summary: High JVM heap usage
          description: Heap usage has remained above 85% for ten minutes.
