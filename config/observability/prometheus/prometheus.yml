global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    service: backend-funeraria-app

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: backend-funeraria-app
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - app:8081

  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: alertmanager
    static_configs:
      - targets:
          - alertmanager:9093
